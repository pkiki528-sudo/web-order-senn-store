<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senn Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Poppins', sans-serif; padding-bottom: 85px; background-color: #f4f6f9; }
      .navbar { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%) !important; }
      .product-card { border: none; border-radius: 16px; transition: transform 0.3s ease; overflow: hidden; }
      .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
      .product-card img { height: 160px; object-fit: cover; }
      .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: #ffffff; box-shadow: 0 -4px 15px rgba(0,0,0,0.08); z-index: 1000; border-radius: 20px 20px 0 0; display: flex; justify-content: space-around; align-items: center; }
      .nav-item-custom { text-align: center; color: #8e9bb0; text-decoration: none; font-size: 11px; flex: 1; padding: 5px 0; cursor: pointer; }
      .nav-item-custom.active { color: #0d6efd; font-weight: 600; }
      .nav-item-custom i { font-size: 22px; display: block; margin-bottom: 2px; }
      .page { display: none; }
      .page.active { display: block; }
      .payment-box { background-color: #fff3cd; border: 1px solid #ffeeba; color: #856404; border-radius: 12px; }
    </style>
  </head>
  <body>

    <!-- Header -->
    <nav class="navbar navbar-dark sticky-top shadow">
      <div class="container-fluid px-3 d-flex justify-content-between align-items-center">
        <span class="navbar-brand mb-0 h1 fw-bold"><i class="bi bi-shop me-2"></i>Senn Store</span>
        <span class="badge bg-light text-primary py-2 px-3 rounded-pill fw-semibold">Belum Login (Guest)</span>
      </div>
    </nav>

    <div class="container mt-4">
      <!-- 1. KATALOG -->
      <div id="page-katalog" class="page active">
        <h5 class="fw-bold mb-3 text-secondary">Katalog Unggulan</h5>
        <div id="product-list" class="row row-cols-2 row-cols-md-4 g-3">
          <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Memuat katalog...</p>
          </div>
        </div>
      </div>

      <!-- 2. KERANJANG -->
      <div id="page-keranjang" class="page">
        <h5 class="fw-bold mb-3 text-secondary">Keranjang Belanja</h5>
        <div class="card border-0 p-3 shadow-sm rounded-4 mb-3">
          <h6 class="fw-bold text-dark mb-2 small">Data Pemesan:</h6>
          <div class="row g-2">
            <div class="col-6"><input type="text" id="guest-nama" class="form-control form-control-sm" placeholder="Nama Lengkap"></div>
            <div class="col-6"><input type="number" id="guest-hp" class="form-control form-control-sm" placeholder="No. WhatsApp"></div>
          </div>
        </div>

        <div class="card border-0 p-3 shadow-sm rounded-4 mb-3">
          <h6 class="fw-bold text-dark mb-2 small">Pilih Metode Pembayaran:</h6>
          <select id="payment-method" class="form-select form-select-sm mb-2" onchange="updatePaymentInfo()">
            <option value="QRIS">QRIS DANA (Otomatis Muncul QR)</option>
            <option value="DANA">E-Wallet DANA</option>
          </select>
          <div id="payment-info" class="p-2 small text-center payment-box fw-bold mb-2">Scan QRIS DANA di bawah ini.</div>
          <div id="qris-container" class="text-center p-2 bg-white rounded-3 shadow-sm">
            <img src="https://i.postimg.cc/q736xG4v/Whats-App-Image-2026-07-18-at-03-34-45.jpg" class="img-fluid" style="max-height: 250px;">
          </div>
        </div>

        <div class="card border-0 p-4 shadow-sm rounded-4 mb-3">
          <div id="cart-list"></div>
          <hr>
          <div class="d-flex justify-content-between align-items-center">
            <h6>Total:</h6><h5 id="cart-total" class="fw-bold text-primary m-0">Rp 0</h5>
          </div>
          <button class="btn btn-success btn-lg w-100 mt-4 rounded-3 fw-semibold" onclick="prosesCheckout()">Konfirmasi Bayar ke WA</button>
        </div>
      </div>
    </div>

    <!-- Nav Bawah -->
    <div class="bottom-nav">
      <div class="nav-item-custom active" id="nav-katalog" onclick="switchPage('katalog')"><i class="bi bi-grid-fill"></i>Katalog</div>
      <div class="nav-item-custom" id="nav-keranjang" onclick="switchPage('keranjang')"><i class="bi bi-bag-check-fill"></i>Keranjang</div>
    </div>

    <script>
      // ⚠️ TEMPELKAN URL DARI LANGKAH 1 DI SINI
      const API_URL = "TEMPEL_URL_APPLIKASI_WEB_GOOGLE_KAMU_DISINI";

      let cart = [];

      document.addEventListener("DOMContentLoaded", () => { loadProducts(); });

      function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item-custom').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
      }

      function updatePaymentInfo() {
        const method = document.getElementById('payment-method').value;
        const qris = document.getElementById('qris-container');
        if (method === 'QRIS') qris.classList.remove('d-none');
        else qris.classList.add('d-none');
      }

      function loadProducts() {
        fetch(API_URL)
        .then(res => res.json())
        .then(products => {
          let catalogHtml = '';
          products.forEach(p => {
            catalogHtml += `
              <div class="col">
                <div class="card h-100 product-card shadow-sm">
                  <img src="${p.gambar_url || 'https://via.placeholder.com/150'}" class="card-img-top">
                  <div class="card-body p-2 d-flex flex-column justify-content-between">
                    <div><h6 class="fw-bold mb-1 small">${p.nama}</h6><p class="text-primary fw-bold mb-1 small">Rp ${Number(p.harga).toLocaleString('id-ID')}</p></div>
                    <button class="btn btn-primary btn-sm w-100 py-1" onclick="addToCart(${p.id}, '${p.nama}', ${p.harga})">+ Keranjang</button>
                  </div>
                </div>
              </div>`;
          });
          document.getElementById('product-list').innerHTML = catalogHtml;
        });
      }

      function addToCart(id, nama, harga) {
        let item = cart.find(c => c.id === id);
        if (item) item.qty++; else cart.push({ id, nama, harga, qty: 1 });
        updateCartUI();
        alert("Berhasil ditambahkan ke keranjang!");
      }

      function updateCartUI() {
        let html = ''; let total = 0;
        cart.forEach(item => {
          total += (item.harga * item.qty);
          html += `<div class="d-flex justify-content-between small mb-1"><span>${item.nama} (${item.qty}x)</span><span>Rp ${(item.harga*item.qty).toLocaleString('id-ID')}</span></div>`;
        });
        document.getElementById('cart-list').innerHTML = html || 'Keranjang Kosong';
        document.getElementById('cart-total').innerText = 'Rp ' + total.toLocaleString('id-ID');
      }

      function prosesCheckout() {
        if(cart.length === 0) return alert('Keranjang kosong!');
        let name = document.getElementById('guest-nama').value;
        let hp = document.getElementById('guest-hp').value;
        if(!name || !hp) return alert('Lengkapi data pemesan!');
        
        let total = cart.reduce((acc, curr) => acc + (curr.harga * curr.qty), 0);
        
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'checkout', username: name, cartItems: cart, totalHarga: total }) })
        .then(res => res.json())
        .then(res => {
          if(res.success) {
            let waText = `🛍️ *SENN STORE*\nID: ${res.orderId}\nPemesan: ${name}\nTotal: Rp ${total.toLocaleString('id-ID')}`;
            cart = [];
            updateCartUI();
            window.location.href = `https://api.whatsapp.com/send?phone=628551176805&text=${encodeURIComponent(waText)}`;
          }
        });
      }
    </script>
  </body>
</html>
